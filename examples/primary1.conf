# PostgreSQL Configuration for Primary Node with pgraft
# Minimal configuration with only essential settings

# Basic PostgreSQL settings
listen_addresses = '*'
port = 5440
max_connections = 100
shared_buffers = 32MB
effective_cache_size = 1GB

# WAL settings for replication
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10

# pgraft extension
shared_preload_libraries = 'pgraft'

# pgraft cluster configuration (etcd-compatible)
pgraft.name = 'primary1'
pgraft.data_dir = '/tmp/pgraft/primary1'
pgraft.initial_cluster = 'primary1=http://127.0.0.1:2380,replica1=http://127.0.0.1:2381'
pgraft.initial_cluster_state = 'new'
pgraft.initial_cluster_token = 'pgraft-cluster-token'
pgraft.initial_advertise_peer_urls = 'http://127.0.0.1:2380'
pgraft.listen_peer_urls = 'http://127.0.0.1:2380'
pgraft.advertise_client_urls = 'http://127.0.0.1:2379'
pgraft.listen_client_urls = 'http://127.0.0.1:2379'

# consensus settings
pgraft.election_timeout = 1000
pgraft.heartbeat_interval = 100
pgraft.snapshot_count = 10000

# logging settings
pgraft.log_level = 'info'

# PostgreSQL-specific settings
pgraft.go_library_path = '/usr/local/pgsql.17/lib/pgraft_go.dylib'