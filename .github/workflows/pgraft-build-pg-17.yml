name: pgraft-build-pg-17

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            make \
            wget \
            gnupg \
            ca-certificates

      - name: Install PostgreSQL 17
        run: |
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-server-dev-17

      - name: Verify PostgreSQL installation
        run: |
          which pg_config
          pg_config --version
          pg_config --includedir
          pg_config --libdir

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Verify Go installation
        run: |
          go version
          which go

      - name: Set up build environment
        run: |
          # Set up PostgreSQL paths
          PG_INCLUDEDIR=$(pg_config --includedir)
          PG_INCLUDEDIR_SERVER=$(pg_config --includedir-server)
          PG_LIBDIR=$(pg_config --libdir)
          PG_PKGLIBDIR=$(pg_config --pkglibdir)
          
          # CGO environment
          echo "CGO_CFLAGS=-I${PG_INCLUDEDIR} -I${PG_INCLUDEDIR_SERVER}" >> $GITHUB_ENV
          echo "CGO_LDFLAGS=-L${PG_LIBDIR}" >> $GITHUB_ENV
          echo "CGO_ENABLED=1" >> $GITHUB_ENV
          
          # PostgreSQL config
          echo "PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config" >> $GITHUB_ENV
          echo "PG_LIBDIR=${PG_LIBDIR}" >> $GITHUB_ENV
          
          # Set PATH
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH

      - name: Download Go dependencies
        run: |
          cd src
          go mod download
          go mod verify

      - name: Fix Makefile for Linux
        run: |
          # Create a temporary Makefile override for Linux builds
          cat > Makefile.linux <<'EOF'
          # Override macOS-specific settings for Linux
          PG_CONFIG := /usr/lib/postgresql/17/bin/pg_config
          GO_RAFT_LIB := src/pgraft_go.so
          
          # Override Go build to produce .so instead of .dylib
          $(GO_RAFT_LIB): src/pgraft_go.go src/go.mod
          	cd src && go mod tidy
          	cd src && go build -buildmode=c-shared -o pgraft_go.so pgraft_go.go
          
          clean-extra:
          	rm -f src/*.o
          	rm -f src/pgraft_go.so
          	rm -f src/pgraft_go.h
          
          install-go-lib: $(GO_RAFT_LIB)
          	$(INSTALL_SHLIB) src/pgraft_go.so '$(DESTDIR)$(pkglibdir)/pgraft_go.so'
          EOF

      - name: Build pgraft
        run: |
          # Include Linux overrides and build
          make PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config -f Makefile -f Makefile.linux clean
          make PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config -f Makefile -f Makefile.linux

      - name: Verify build output
        run: |
          ls -lh *.so *.dylib *.a 2>/dev/null || true
          if [ -f pgraft.so ]; then
            echo "✓ Build successful: pgraft.so created"
            file pgraft.so
          elif [ -f pgraft.dylib ]; then
            echo "✓ Build successful: pgraft.dylib created"
            file pgraft.dylib
          else
            echo "✗ Build failed: No output files found"
            exit 1
          fi

      - name: Verify all build artifacts
        run: |
          echo "Checking build artifacts..."
          echo ""
          echo "Main library:"
          ls -lh pgraft.so 2>/dev/null || ls -lh pgraft.dylib 2>/dev/null || echo "Warning: No main library found"
          echo ""
          echo "Go library:"
          ls -lh src/pgraft_go.so 2>/dev/null || ls -lh src/pgraft_go.dylib 2>/dev/null || echo "Warning: No Go library found"
          echo ""
          echo "Object files:"
          ls -lh src/*.o 2>/dev/null || echo "Warning: No object files found"
          echo ""
          
      - name: Check for build warnings
        run: |
          echo "Checking for warnings in last build..."
          if [ -f build.log ]; then
            if grep -i "warning:" build.log; then
              echo "⚠ Warnings found in build"
            else
              echo "✓ No warnings detected"
            fi
          else
            echo "No build log found, skipping warning check"
          fi

